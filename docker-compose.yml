services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ultium
      POSTGRES_PASSWORD: ultium
      POSTGRES_DB: ultiumgrid
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ultium -d ultiumgrid"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - ultiumnet

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://ultium:ultium@db:5432/ultiumgrid
      ULTIUM_INSTANCE_ID: btc
      ULTIUM_INSTANCE_LABEL: "UltiumGrid — Instance BTC"
      ULTIUM_ACCENT: "#3b82f6"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ultiumnet

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://ultium:ultium@db:5432/ultiumgrid
      ULTIUM_INSTANCE_ID: btc
      ULTIUM_INSTANCE_LABEL: "UltiumGrid — Instance BTC"
      ULTIUM_ACCENT: "#3b82f6"
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Internal only; user-owned port_beacon.py exposes 8000 for Cursor auto-forward
      - "127.0.0.1:18000:8000"
    restart: unless-stopped
    networks:
      - ultiumnet

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      # Internal only; user-owned port_beacon.py exposes 8080 for Cursor auto-forward
      - "127.0.0.1:18080:80"
    restart: unless-stopped
    networks:
      - ultiumnet

  supervisor:
    build:
      context: .
      dockerfile: supervisor/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://ultium:ultium@db:5432/ultiumgrid
      SUPERVISOR_BOT_HEALTH_URL: http://backend:8000/health
      SUPERVISOR_HEARTBEAT_TIMEOUT_S: "90"
      SUPERVISOR_RECON_THRESHOLD_USDT: "1.0"
      SUPERVISOR_MARKET_ANOMALY_PCT: "0.5"
      SUPERVISOR_POLL_S: "15"
      SUPERVISOR_EMERGENCY_ACTION: "false"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      bot:
        condition: service_started
    restart: unless-stopped
    networks:
      - ultiumnet

  egaliseur:
    build:
      context: .
      dockerfile: egaliseur/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://ultium:ultium@db:5432/ultiumgrid
      EGALISEUR_RESTRICTED_MODE: "true"
      EGALISEUR_OPERATION_MODE: "test_only"
      EGALISEUR_POLL_S: "5"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ultiumnet

volumes:
  pgdata:

networks:
  ultiumnet:
    driver: bridge
